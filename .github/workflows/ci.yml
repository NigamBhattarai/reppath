name: CI
on:
  pull_request:
    branches:
      - develop
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install node
        uses: actions/setup-node@v4
        with: 
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit
        working-directory: apps/backend

      - name: Run Jest
        run: npm run test
        working-directory: apps/backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
